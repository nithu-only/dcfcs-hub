<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DCF Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/flatpickr-theme.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="config.js"></script>
    <script defer src="js/common.js"></script>
    <script defer src="js/admin.js"></script>
</head>
<body>

    <div id="loginPage" class="wrapper">
        <div class="card">
            <h1>Department of DCF</h1>

            <input id="username" class="input" placeholder="Username">
            <input id="password" class="input" type="password" placeholder="Password">

            <button id="loginBtn" class="btn" onclick="login()">
                Login
            </button>
        </div>
    </div>

    <div id="dashboard" class="wrapper hidden">
        <div class="card">

            <div class="topbar">
                <div>
                    <h1 style="margin:0;text-align:left;">
                        Admin Dashboard
                    </h1>
                    <div id="welcome"></div>
                </div>

                <button class="btn logout" onclick="logoutAdmin()">
                    Logout
                </button>
            </div>

            <div class="controls">
                <select id="sheetName"></select>

                <input
                    type="text"
                    id="date"
                    placeholder="Select Date"
                    readonly
                >

                <select id="hour">
                    <option value="9-10">9-10</option>
                    <option value="10-11">10-11</option>
                    <option value="11-12">11-12</option>
                    <option value="12-1">12-1</option>
                    <option value="2-3">2-3</option>
                    <option value="3-4">3-4</option>
                </select>

                <button
                    id="loadBtn"
                    class="btn"
                    onclick="loadReport()"
                >
                    Load
                </button>
            </div>

            <div class="summary">
                <div class="stat">
                    <h3>Total Students</h3>
                    <p id="total">0</p>
                </div>

                <div class="stat">
                    <h3>Present</h3>
                    <p id="present">0</p>
                </div>

                <div class="stat">
                    <h3>Absent</h3>
                    <p id="absent">0</p>
                </div>

                <div class="stat">
                    <h3>Attendance %</h3>
                    <p id="percent">0%</p>
                </div>
            </div>

            <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
                <button class="btn logout" onclick="downloadCSV()">
                    Download Today's Attendance
                </button>

                <button class="btn logout" onclick="downloadFullAttendance()">
                    Download Full Attendance
                </button>
            </div>

            <div id="studentList"></div>

        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modalTitle">Message</h3>
            <p id="modalText"></p>

            <div class="modal-actions">
                <button id="modalCancel" class="btn secondary hidden">
                    Cancel
                </button>

                <button id="modalOk" class="btn">
                    OK
                </button>
            </div>
        </div>
    </div>

</body>
</html>
