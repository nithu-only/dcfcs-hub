<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCF Student Portal</title>
  <script src="../config.js"></script>

  <link rel="stylesheet" href="../css/student.css">
</head>
<body>

  <!-- SEARCH PAGE -->
  <div id="searchPage" class="wrapper">
    <div class="card">
      <h1>Department of DCF</h1>
      <p class="subheading">Student Portal</p>

      <input
        id="regNo"
        class="input"
        placeholder="Enter Register Number"
        autocomplete="off"
      >

      <button
        id="searchBtn"
        class="btn"
        onclick="searchAttendance()"
      >
        View Attendance
      </button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="wrapper hidden">
    <div class="card">

      <div class="topbar">
        <div>
          <h1 style="margin:0">Attendance Dashboard</h1>
          <div id="welcome"></div>
        </div>

        <button class="btn logout" onclick="goBack()">
          Search Another
        </button>
      </div>

      <!-- STUDENT CARD -->
      <div class="summary-card">
        <div>
          <div class="label">Student Name</div>
          <div id="studentName" class="value">-</div>
        </div>

        <div>
          <div class="label">Register No</div>
          <div id="studentRegNo" class="value">-</div>
        </div>

        <div>
          <div class="label">Class</div>
          <div id="studentClass" class="value">-</div>
        </div>

        <div>
          <div class="label">Overall Attendance</div>
          <div id="overallPercent" class="value green">0%</div>
        </div>
      </div>

      <!-- SUBJECTS -->
      <h2 class="section-title">Subjects</h2>
      <div id="subjectsGrid" class="subjects-grid"></div>

    </div>
  </div>

  <!-- DETAILS MODAL -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box large">

      <h3 id="modalTitle">Subject Details</h3>

      <div id="modalContent"></div>

      <div class="modal-actions">
        <button id="modalOk" class="btn">Close</button>
      </div>

    </div>
  </div>

  <!-- ALERT MODAL -->
  <div id="alertOverlay" class="modal-overlay hidden">
    <div class="modal-box">

      <h3 id="alertTitle">Message</h3>
      <p id="alertText"></p>

      <div class="modal-actions">
        <button id="alertOk" class="btn">OK</button>
      </div>

    </div>
  </div>

  <script src="../js/student.js"></script>
</body>
</html>
