<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DCF Attendance</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#111;
      border:1px solid rgba(47,158,111,.35);
      border-radius:20px;
      box-shadow:0 0 25px rgba(47,158,111,.12);
      padding:40px 30px;
      text-align:center;
    }

    h1{
      color:#2f9e6f;
      font-size:38px;
      margin-bottom:10px;
    }

    .sub{
      color:#9ad9b8;
      margin-bottom:35px;
      font-size:15px;
    }

    .btn{
      display:block;
      width:100%;
      padding:16px;
      margin-bottom:15px;
      border:none;
      border-radius:14px;
      background:#2f9e6f;
      color:white;
      font-size:17px;
      cursor:pointer;
      transition:.2s;
      text-decoration:none;
      font-weight:600;
    }

    .btn:hover{
      background:#37b77f;
      transform:translateY(-1px);
    }

    .btn.secondary{
      background:#151515;
      border:1px solid #2f9e6f;
    }

    .footer{
      margin-top:18px;
      color:#777;
      font-size:13px;
    }

    @media(max-width:600px){
      h1{
        font-size:30px;
      }

      .card{
        padding:30px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Department of DCF</h1>
    <div class="sub">Attendance Management System</div>

    <a href="teacher/index.html" class="btn">
      Teacher Portal
    </a>

    <a href="student/index.html" class="btn secondary">
      Student Portal
    </a>

    <div class="footer">
      © Department of DCF
    </div>
  </div>

</body>
</html>
